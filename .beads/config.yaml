# Beads Configuration File
#
# This repo tracks the roadmap in `.beads/issues.jsonl` on `main` (no sync branch).
# Keep this file in git so new checkouts have a consistent baseline.
#
# Most settings are optional and can be set via `bd config set ...` (stored in the DB).

# Issue prefix for this repository (used by `bd init`)
issue-prefix: "genes"

# no-db: false
# no-daemon: false
# no-auto-flush: false
# no-auto-import: false

# NOTE: Do not set `sync-branch` in this repo. There is intentionally no `beads-sync` branch.
# sync-branch: ""

# All linked Git worktrees share this Beads database. An automatic export from
# one worktree can therefore rewrite the primary checkout while somebody is
# editing it. Keep the database as the live source of truth and publish the
# tracked JSONL snapshot only through `yarn beads:export` from a clean, current
# primary checkout. See docs/BEADS_WORKTREES.md.
export.auto: false
export.git-add: false
