name: genes-ts CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".beads/**"
  pull_request:
    paths-ignore:
      - ".beads/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  YARN_VERSION: "1.22.22"

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  secrets:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: toolchains
        run: node scripts/emit-toolchain-outputs.mjs
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.toolchains.outputs.node-stable }}
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate
      - run: yarn install --frozen-lockfile
      - run: yarn test:secrets

  vulns:
    name: Vulnerabilities (OSV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: toolchains
        run: node scripts/emit-toolchain-outputs.mjs
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.toolchains.outputs.node-stable }}
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate
      - run: yarn install --frozen-lockfile
      - run: yarn test:vulns

  classic:
    name: Classic Genes (${{ matrix.node-lane }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow-failure || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-lane: stable
          - os: ubuntu-latest
            node-lane: nextLts
          - os: macos-latest
            node-lane: stable
            allow-failure: true
    steps:
      - uses: actions/checkout@v4
      - id: toolchains
        run: node scripts/emit-toolchain-outputs.mjs
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-lane == 'stable' && steps.toolchains.outputs.node-stable || steps.toolchains.outputs.node-next-lts }}
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate
      - name: Cache Haxe toolchain (lix)
        uses: actions/cache@v4
        with:
          path: |
            ~/haxe
          key: ${{ runner.os }}-lix-haxe-${{ steps.toolchains.outputs.haxe-stable }}-node-${{ matrix.node-lane }}-${{ hashFiles('.haxerc', 'haxe_libraries/*.hxml', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-lix-haxe-${{ steps.toolchains.outputs.haxe-stable }}-node-${{ matrix.node-lane }}-
            ${{ runner.os }}-lix-haxe-${{ steps.toolchains.outputs.haxe-stable }}-
      - run: yarn install --frozen-lockfile
      - run: yarn lix install haxe ${{ steps.toolchains.outputs.haxe-stable }}
      - run: yarn lix use haxe ${{ steps.toolchains.outputs.haxe-stable }}
      - run: yarn test

  genes-ts:
    name: genes-ts (TS output + todoapp E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: toolchains
        run: node scripts/emit-toolchain-outputs.mjs
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.toolchains.outputs.node-stable }}
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate
      - name: Cache Haxe toolchain (lix)
        uses: actions/cache@v4
        with:
          path: |
            ~/haxe
          key: ${{ runner.os }}-lix-haxe-${{ steps.toolchains.outputs.haxe-stable }}-${{ hashFiles('.haxerc', 'haxe_libraries/*.hxml', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-lix-haxe-${{ steps.toolchains.outputs.haxe-stable }}-
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('yarn.lock') }}
      - run: yarn install --frozen-lockfile
      - run: yarn lix install haxe ${{ steps.toolchains.outputs.haxe-stable }}
      - run: yarn lix use haxe ${{ steps.toolchains.outputs.haxe-stable }}
      - run: yarn test:acceptance
        env:
          SKIP_CLASSIC: "1"
          SKIP_TS2HX: "1"
      - run: yarn test:ts2hx
      - run: yarn test:matrix:api
      - run: yarn test:classic:dts
      - run: yarn test:library-profile

  genes-ts-smoke-next-lts:
    name: genes-ts smoke (Node next LTS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: toolchains
        run: node scripts/emit-toolchain-outputs.mjs
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.toolchains.outputs.node-next-lts }}
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate
      - name: Cache Haxe toolchain (lix)
        uses: actions/cache@v4
        with:
          path: |
            ~/haxe
          key: ${{ runner.os }}-lix-haxe-${{ steps.toolchains.outputs.haxe-stable }}-node-next-lts-${{ hashFiles('.haxerc', 'haxe_libraries/*.hxml', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-lix-haxe-${{ steps.toolchains.outputs.haxe-stable }}-node-next-lts-
            ${{ runner.os }}-lix-haxe-${{ steps.toolchains.outputs.haxe-stable }}-
      - run: yarn install --frozen-lockfile
      - run: yarn lix install haxe ${{ steps.toolchains.outputs.haxe-stable }}
      - run: yarn lix use haxe ${{ steps.toolchains.outputs.haxe-stable }}
      - run: yarn test:acceptance
        env:
          SKIP_CLASSIC: "1"
          SKIP_TS2HX: "1"
          SKIP_PLAYWRIGHT: "1"

  haxe-preview:
    name: Haxe preview (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - id: toolchains
        run: node scripts/emit-toolchain-outputs.mjs
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.toolchains.outputs.node-stable }}
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate
      - name: Cache Haxe preview toolchain (lix)
        uses: actions/cache@v4
        with:
          path: ~/haxe
          key: ${{ runner.os }}-lix-haxe-${{ steps.toolchains.outputs.haxe-preview }}-${{ hashFiles('haxe_libraries/*.hxml', 'yarn.lock') }}
      - run: yarn install --frozen-lockfile
      - run: yarn lix install haxe ${{ steps.toolchains.outputs.haxe-preview }}
      - run: yarn lix use haxe ${{ steps.toolchains.outputs.haxe-preview }}
      - run: yarn test
      - run: yarn test:genes-ts:minimal
